model:
  # vLLM 加载 safetensors 格式（目录路径，非单文件）
  path: "./models/Qwen2.5-7B-Instruct"
  engine: "vllm"
  dtype: "float16"
  gpu_memory_utilization: 0.90
  n_ctx: 8192
  temperature: 0.7
  max_tokens: 4096
  # 多卡并行（ROCm 7.2.1 仅 1 或 8 稳定，2/4/6 可能失败）
  # 单卡跑 7B/14B 用 tensor_parallel_size: 1
  # 8 卡跑 32B 用 tensor_parallel_size: 8
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

agent:
  max_iterations: 10
  memory_enabled: true
  # 工具名必须与 tools/*.py 中 registry.register_tool(name=...) 一致
  tools:
    - read_file
    - write_file
    - delete_file
    - list_directory
    - create_directory
    - execute_command
    - execute_python
    - code_interpreter
    - format_code
    - get_system_info
    - get_gpu_info
    - get_process_list

rag:
  vector_store: "faiss"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5

ui:
  port: 7860
  title: "AMD Radeon 本地智能体系统"

security:
  audit_log_enabled: true
  # 高危操作需用户审批（与 tools/*.py 中 requires_approval=True 对应）
  require_approval_for:
    - delete_file
    - execute_command
    - execute_python
    - code_interpreter