model:
  path: "./models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
  n_gpu_layers: -1
  n_ctx: 8192
  n_batch: 512
  temperature: 0.7
  max_tokens: 4096

agent:
  max_iterations: 10
  memory_enabled: true
  # 工具名必须与 tools/*.py 中 registry.register_tool(name=...) 一致
  tools:
    - read_file
    - write_file
    - delete_file
    - list_directory
    - create_directory
    - execute_command
    - execute_python
    - code_interpreter
    - format_code
    - get_system_info
    - get_gpu_info
    - get_process_list

rag:
  vector_store: "faiss"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5

ui:
  port: 7860
  title: "AMD Radeon 本地智能体系统"

security:
  audit_log_enabled: true
  # 高危操作需用户审批（与 tools/*.py 中 requires_approval=True 对应）
  require_approval_for:
    - delete_file
    - execute_command
    - execute_python
    - code_interpreter